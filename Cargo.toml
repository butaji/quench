[package]
name = "runts"
version = "0.1.0"
edition = "2021"
description = "Fresh/Preact to native Rust compiler"
authors = ["runts team"]
license = "MIT OR Apache-2.0"
rust-version = "1.81"
autolib = false

[[bin]]
name = "runts"
path = "src/main.rs"

[workspace]
members = [
    "crates/runts-macros",
    "crates/runts-lib",
    "crates/runts-client",
    "crates/runts-plugin",
    "crates/runts-fresh",
    "crates/runts-ink",
    "crates/runts-ratatui",
    "crates/runts-react",
]
# `examples/*` are independent Cargo projects. Each has
# its own `Cargo.toml` with `path = "../../crates/..."`
# deps; they shouldn't be part of the main workspace.
exclude = [
    "examples/ink-counter",
]

[dependencies]

# Core
runts-ink = { path = "crates/runts-ink" }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
once_cell = "1.19"

# Memory
bumpalo = "3.16"

# Server
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors", "trace", "compression-gzip"] }
tokio = { version = "1.0", features = ["rt", "rt-multi-thread", "sync", "macros", "io-util", "net"] }
# Async
async-stream = "0.3"

# JavaScript runtime (QuickJS)
rquickjs = "0.12"

# File watching
notify = "6.1"
walkdir = "2.5"

# Utilities
parking_lot = "0.12"
indexmap = { version = "2.5", features = ["serde"] }
regex = "1.10"
bytes = "1.5"
mime = "0.3"
mime_guess = "2.0"
urlencoding = "2.1"
tempfile = "3.8"

# Parallel processing
rayon = "1.10"

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# Rust codegen (for HIR -> Rust)
quote = "1.0"
proc-macro2 = "1.0"
syn = { version = "2.0", features = ["full"] }

# Runtime library (for generated code)
runts-macros = { path = "crates/runts-macros" }

# Plugins
runts-fresh = { path = "crates/runts-fresh" }
runts-ratatui = { path = "crates/runts-ratatui" }
# runts-react = { path = "crates/runts-react" }  # TEMPORARILY DISABLED - has pre-existing bugs
runts-plugin = { path = "crates/runts-plugin" }

# Cryptographic hashing (incremental build cache)
sha2 = "0.10"

# OXC — battle-tested TS/TSX parser + codegen
oxc_parser = "0.133"
oxc_allocator = "0.133"
oxc_ast = "0.133"
oxc_span = "0.133"
oxc_codegen = "0.133"
oxc_ast_visit = "0.133"
oxc_transformer = "0.133"
oxc_syntax = "0.133"
oxc_semantic = "0.133"

[dev-dependencies]
pretty_assertions = "1.4"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
