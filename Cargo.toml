[workspace]
resolver = "2"
members = [
    "crates/rune",
    "crates/rune-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Rune Team"]
license = "MIT"

[workspace.dependencies]
# Error handling
thiserror = "1"
anyhow = "1"

# Async and utilities
tokio = { version = "1", features = ["full"] }
notify = "6"
libloading = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
toml = "0.8"

# CLI
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
