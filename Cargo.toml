[package]
name = "runts"
version = "0.1.0"
edition = "2021"
description = "Fresh/Preact to native Rust compiler"
authors = ["runts team"]
license = "MIT OR Apache-2.0"
rust-version = "1.81"

[[bin]]
name = "runts"
path = "src/main.rs"

[lib]
name = "runts_lib"
path = "crates/runts-lib/src/lib.rs"

[dependencies]

# Core
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Server
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors", "trace", "compression-gzip"] }
tokio = { version = "1.0", features = ["full"] }
hyper = "1.0"

# Async
futures = "0.3"
async-stream = "0.3"

# File watching
notify = "6.1"
walkdir = "2.5"

# Utilities
parking_lot = "0.12"
indexmap = { version = "2.5", features = ["serde"] }
regex = "1.10"
bytes = "1.5"
mime = "0.3"
mime_guess = "2.0"
http = "1.0"

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
pretty_assertions = "1.4"
tempfile = "3.8"

[workspace]
members = [
    "crates/runts-macros",
    "crates/runts-lib",
    "crates/runts-client",
    "examples/my-blog",
]

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
