[package]
name = "runts"
version = "0.1.0"
edition = "2021"
description = "Fresh/Preact to native Rust compiler"
authors = ["runts team"]
license = "MIT OR Apache-2.0"
rust-version = "1.81"

[[bin]]
name = "runts"
path = "src/main.rs"

[lib]
name = "runts_lib"
path = "crates/runts-lib/src/lib.rs"

[dependencies]

# Core
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
once_cell = "1.19"

# Server
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors", "trace", "compression-gzip"] }
tokio = { version = "1.0", features = ["full"] }
hyper = "1.0"

# Async
futures = "0.3"
async-stream = "0.3"
tokio-stream = { version = "0.1", features = ["sync"] }

# File watching
notify = "6.1"
walkdir = "2.5"

# Utilities
parking_lot = "0.12"
indexmap = { version = "2.5", features = ["serde"] }
lazy_static = "1.4"
regex = "1.10"
bytes = "1.5"
mime = "0.3"
mime_guess = "2.0"
http = "1.0"
urlencoding = "2.1"
pathdiff = "0.2"

# Parallel processing
rayon = "1.10"

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# Runtime library (for generated code)
runts-macros = { path = "crates/runts-macros" }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Cryptographic hashing (incremental build cache)
sha2 = "0.10"

# OXC — battle-tested TS/TSX parser + codegen
oxc_parser = "0.133"
oxc_allocator = "0.133"
oxc_ast = "0.133"
oxc_span = "0.133"
oxc_codegen = "0.133"
oxc_ast_visit = "0.133"
oxc_transformer = "0.133"
oxc_syntax = "0.133"

[dev-dependencies]
pretty_assertions = "1.4"
tempfile = "3.8"

[workspace]
members = [
    "crates/runts-macros",
    "crates/runts-lib",
    "crates/runts-client",
]

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
